services:
  - type: web
    name: control-deposito-cenoa
    runtime: node
    plan: starter
    buildCommand: cd backend && npm ci
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_DB_PATH
        value: /var/data/auditorias.db
    disk:
      name: control-deposito-data
      mountPath: /var/data
      sizeGB: 1
